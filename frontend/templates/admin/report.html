{% extends "base.html" %}
{% block title %}Báo cáo doanh thu{% endblock %}

{% block content %}
<h3 class="mb-3">Báo cáo doanh thu khách ngoài</h3>

<div class="row mb-3">
  <div class="col-md-4">
    <label class="form-label">Chọn ngày</label>
    <input type="date" id="report-date" class="form-control" value="{{ today }}" />
  </div>
  <div class="col-md-4 d-flex align-items-end">
    <button class="btn btn-primary" id="btn-load-report">Xem báo cáo</button>
  </div>
</div>

<div id="report-summary" class="mb-3"></div>

<div>
  <button class="btn btn-outline-secondary btn-sm" id="btn-load-detail">
    Xuất chi tiết
  </button>
</div>

<div id="report-detail" class="mt-3"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
