{% extends "base.html" %}
{% block title %}Cổng bãi xe{% endblock %}

{% block content %}
<h3 class="mb-3">Cổng bãi giữ xe – Chung cư</h3>

<div class="row">
  <div class="col-md-6 mb-3">
    <div class="card">
      <div class="card-header">Camera / Ảnh demo</div>
      <div class="card-body text-center">
        <!-- Đơn giản dùng input file để demo -->
        <input type="file" id="gate-image" accept="image/*" class="form-control mb-2" />
        <img id="preview-image" src="" alt="Preview" class="img-fluid d-none" />
        <small class="text-muted d-block mt-2">
          Thực tế có thể dùng webcam, ở đây demo dùng upload ảnh.
        </small>
      </div>
    </div>
  </div>

  <div class="col-md-6 mb-3">
    <div class="card mb-3">
      <div class="card-header">Xe cư dân</div>
      <div class="card-body">
        <button class="btn btn-success w-100 mb-2" id="btn-resident-face">
          Xe cư dân – Nhận diện khuôn mặt
        </button>

        <div class="input-group mb-2">
          <span class="input-group-text">Mã dự phòng</span>
          <input type="text" id="backup-code" class="form-control" placeholder="Nhập mã dự phòng khi không nhận diện được" />
          <button class="btn btn-outline-primary" id="btn-backup-login">
            Gửi
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Xe khách ngoài</div>
      <div class="card-body">
        <button class="btn btn-warning w-100 mb-2" id="btn-guest-checkin">
          Xe khách ngoài – Tạo vé 6 số
        </button>

        <div class="input-group mb-2">
          <span class="input-group-text">Mã vé</span>
          <input type="text" id="ticket-code" class="form-control" placeholder="Nhập mã vé để tính tiền & cho ra" />
          <button class="btn btn-outline-danger" id="btn-guest-checkout">
            Checkout
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="gate-result" class="mt-3"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/gate.js') }}"></script>
{% endblock %}
